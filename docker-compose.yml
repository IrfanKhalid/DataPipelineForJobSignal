services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobsignal-app
    env_file: .env
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    # If the external PostgreSQL runs in another Docker network,
    # add that network here under `networks:` or use `network_mode: host`.

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobsignal-app
    env_file: .env
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    networks:
      - jobsignal

  postgres:
    image: postgres:15-alpine
    container_name: jobsignal-db
    environment:
      POSTGRES_DB: ${DB_NAME:-jobsignal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-jobsignal}"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - jobsignal

volumes:
  pgdata:

networks:
  jobsignal:
    driver: bridge

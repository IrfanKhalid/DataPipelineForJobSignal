name: Deploy

on:
  push:
    branches:
      - branch1.1
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Python sources compile
        run: python -m compileall src

      - name: Build Docker image
        run: docker build -t jobsignal:${{ github.sha }} .

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/branch1.1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "Dockerfile,docker-compose.yml,requirements.txt,config,src"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_PATH,DEPLOY_ENV_FILE
          script_stop: true
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            $DEPLOY_ENV_FILE
            EOF
            cd "$DEPLOY_PATH"
            docker compose down --remove-orphans || true
            docker compose up -d --build --remove-orphans
            docker image prune -f
